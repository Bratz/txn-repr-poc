<svg viewBox="0 0 980 680" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img">
  <title>Architecture - v1 (the paper) and the v2 sequence extension</title>
  <desc>A shared stack projects a payment, encodes it through a frozen 25M tabular encoder, and produces one frozen per-transaction embedding f(x). That representation is reused two ways. v1 (the paper): f(x) goes to a Layer-4 decoder - a frozen Phi-1.5 with trainable adapters Phi, psi, phi - producing a per-transaction label (risk, geography, expense, recurrence). v2 (beyond the paper, opt-in): an entity's f(x) embeddings in time order, with inter-arrival encoding, feed a Layer-3b history encoder ([USR] + events, masked + CoLES) into one entity vector h_USR, scored by a cheap linear/LoRA head (Option A) or, optionally, the frozen Phi decoder (Option B, which C5 says to drop). Encoder, Phi and h_USR are frozen; only the small adapters and heads train.</desc>

  <rect x="0" y="0" width="980" height="680" fill="#ffffff"/>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b6b70"/></marker>
  </defs>

  <text x="28" y="38" font-size="21" font-weight="700" fill="#1d1d1f">Architecture - v1 (the paper) and the v2 sequence extension</text>
  <text x="28" y="60" font-size="12.5" fill="#6b6b70">One frozen transaction representation f(x), reused two ways: the paper's per-transaction decoder, and a v2 encoder over an entity's history.</text>

  <!-- ===== TIER 1: shared representation pipeline ===== -->
  <text x="28" y="86" font-size="11" font-weight="700" fill="#6b6b70">SHARED REPRESENTATION  (v1 + v2)</text>
  <g font-size="12.5">
    <rect x="28" y="94" width="120" height="46" rx="8" fill="#ffffff" stroke="#c4c4c8" stroke-width="1.5"/>
    <text x="88" y="116" font-weight="600" text-anchor="middle" fill="#1d1d1f">Payment</text>
    <text x="88" y="132" font-size="10.5" text-anchor="middle" fill="#6b6b70">pacs.008</text>
    <line x1="148" y1="117" x2="166" y2="117" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

    <rect x="168" y="94" width="120" height="46" rx="8" fill="#ffffff" stroke="#c4c4c8" stroke-width="1.5"/>
    <text x="228" y="116" font-weight="600" text-anchor="middle" fill="#1d1d1f">Projection</text>
    <text x="228" y="132" font-size="10.5" text-anchor="middle" fill="#6b6b70">to tabular row</text>
    <line x1="288" y1="117" x2="306" y2="117" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

    <rect x="308" y="94" width="208" height="46" rx="8" fill="#ffffff" stroke="#c4c4c8" stroke-width="1.5"/>
    <text x="412" y="116" font-weight="600" text-anchor="middle" fill="#1d1d1f">Layer 2 field encoders</text>
    <text x="412" y="132" font-size="10" text-anchor="middle" fill="#6b6b70">3.1 IDs · 3.3 amount · 3.2 party</text>
    <line x1="516" y1="117" x2="534" y2="117" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

    <rect x="536" y="94" width="170" height="46" rx="8" fill="#e7e8ea" stroke="#9a9aa0" stroke-width="1.5"/>
    <text x="621" y="116" font-weight="600" text-anchor="middle" fill="#1d1d1f">Layer 3 encoder</text>
    <text x="621" y="132" font-size="10.5" text-anchor="middle" fill="#6b6b70">BERT 25M · frozen</text>
    <line x1="706" y1="117" x2="724" y2="117" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

    <rect x="726" y="94" width="104" height="46" rx="8" fill="#e7e8ea" stroke="#9a9aa0" stroke-width="1.5"/>
    <text x="778" y="116" font-weight="700" text-anchor="middle" fill="#1d1d1f">f(x)</text>
    <text x="778" y="132" font-size="10.5" text-anchor="middle" fill="#6b6b70">per transaction</text>
  </g>

  <!-- f(x) rail: distributes the shared representation to both lanes -->
  <line x1="778" y1="140" x2="778" y2="160" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>
  <rect x="28" y="160" width="924" height="26" rx="8" fill="#eef2f8" stroke="#c4c4c8" stroke-width="1.2"/>
  <text x="490" y="177" font-size="11.5" font-weight="600" text-anchor="middle" fill="#2c6ecb">f(x)  -  frozen per-transaction representation, shared by both paths</text>

  <!-- ===== v1 LANE (left) ===== -->
  <rect x="28" y="200" width="448" height="240" rx="10" fill="none" stroke="#c4c4c8" stroke-width="1.5"/>
  <text x="44" y="222" font-size="12" font-weight="700" fill="#1d1d1f">v1 · per transaction</text>
  <text x="44" y="238" font-size="10.5" fill="#6b6b70">faithful to arXiv:2410.07851</text>
  <line x1="252" y1="186" x2="252" y2="256" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

  <rect x="116" y="258" width="272" height="64" rx="9" fill="#e7e8ea" stroke="#9a9aa0" stroke-width="1.5"/>
  <text x="252" y="282" font-size="13" font-weight="700" text-anchor="middle" fill="#1d1d1f">Layer 4 - decoder</text>
  <text x="252" y="300" font-size="10.5" text-anchor="middle" fill="#6b6b70">frozen Phi-1.5  +  trainable {Phi, psi, phi}</text>
  <line x1="252" y1="322" x2="252" y2="346" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

  <rect x="92" y="348" width="320" height="56" rx="9" fill="#ffffff" stroke="#c4c4c8" stroke-width="1.5"/>
  <text x="252" y="372" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">per-transaction task</text>
  <text x="252" y="390" font-size="10.5" text-anchor="middle" fill="#6b6b70">risk · geography · expense · recurrence</text>

  <!-- ===== v2 LANE (right) - dashed = beyond the paper ===== -->
  <rect x="500" y="200" width="452" height="426" rx="10" fill="none" stroke="#2c6ecb" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="516" y="222" font-size="12" font-weight="700" fill="#1d1d1f">v2 · per entity over time</text>
  <rect x="812" y="208" width="126" height="18" rx="9" fill="#dce8f7" stroke="#2c6ecb" stroke-width="1"/>
  <text x="875" y="221" font-size="9.5" text-anchor="middle" fill="#2c6ecb">beyond the paper · opt-in</text>
  <line x1="728" y1="186" x2="728" y2="244" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

  <rect x="556" y="246" width="344" height="50" rx="9" fill="#ffffff" stroke="#c4c4c8" stroke-width="1.5"/>
  <text x="728" y="268" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1d1d1f">ordered history:  e1  e2  ...  en   (+ time)</text>
  <text x="728" y="285" font-size="10" text-anchor="middle" fill="#6b6b70">an entity's f(x), in time order + inter-arrival</text>
  <line x1="728" y1="296" x2="728" y2="318" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

  <rect x="556" y="320" width="344" height="58" rx="9" fill="#dce8f7" stroke="#2c6ecb" stroke-width="1.5"/>
  <text x="728" y="344" font-size="12.5" font-weight="700" text-anchor="middle" fill="#1d1d1f">Layer 3b - history encoder</text>
  <text x="728" y="362" font-size="10.5" text-anchor="middle" fill="#6b6b70">[USR] + events  ->  h_USR   ·   masked + CoLES</text>
  <line x1="728" y1="378" x2="728" y2="398" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>

  <rect x="672" y="400" width="112" height="44" rx="8" fill="#e7e8ea" stroke="#9a9aa0" stroke-width="1.5"/>
  <text x="728" y="421" font-size="12" font-weight="700" text-anchor="middle" fill="#1d1d1f">h_USR</text>
  <text x="728" y="436" font-size="10" text-anchor="middle" fill="#6b6b70">entity vector</text>

  <!-- two heads -->
  <line x1="700" y1="444" x2="628" y2="474" stroke="#6b6b70" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="756" y1="444" x2="838" y2="474" stroke="#6b6b70" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <rect x="536" y="476" width="184" height="48" rx="9" fill="#dce8f7" stroke="#2c6ecb" stroke-width="1.5"/>
  <text x="628" y="498" font-size="12" font-weight="700" text-anchor="middle" fill="#1d1d1f">Option A: linear / LoRA</text>
  <text x="628" y="514" font-size="10" text-anchor="middle" fill="#6b6b70">the cheap head</text>

  <rect x="760" y="476" width="176" height="48" rx="9" fill="#ffffff" stroke="#9a9aa0" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="848" y="498" font-size="12" font-weight="700" text-anchor="middle" fill="#1d1d1f">Option B: Phi (Layer 4)</text>
  <text x="848" y="514" font-size="10" text-anchor="middle" fill="#6b6b70">optional - C5: drop it</text>

  <line x1="628" y1="524" x2="628" y2="548" stroke="#6b6b70" stroke-width="2" marker-end="url(#a)"/>
  <rect x="536" y="550" width="184" height="44" rx="9" fill="#ffffff" stroke="#c4c4c8" stroke-width="1.5"/>
  <text x="628" y="571" font-size="12" font-weight="600" text-anchor="middle" fill="#1d1d1f">entity task</text>
  <text x="628" y="586" font-size="10" text-anchor="middle" fill="#6b6b70">regime change / anomaly</text>

  <!-- ===== legend ===== -->
  <rect x="300" y="646" width="14" height="14" rx="3" fill="#dce8f7" stroke="#2c6ecb" stroke-width="1.4"/>
  <text x="320" y="657" font-size="11.5" fill="#6b6b70">Trained (small)</text>
  <rect x="446" y="646" width="14" height="14" rx="3" fill="#e7e8ea" stroke="#9a9aa0" stroke-width="1.4"/>
  <text x="466" y="657" font-size="11.5" fill="#6b6b70">Frozen</text>
  <rect x="560" y="646" width="14" height="14" rx="3" fill="#ffffff" stroke="#2c6ecb" stroke-width="1.3" stroke-dasharray="3 2"/>
  <text x="580" y="657" font-size="11.5" fill="#6b6b70">v2 / optional (beyond the paper)</text>
</svg>
